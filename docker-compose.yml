services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 2s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  server:
    build: .
    ports:
      - "3001:3001"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - PORT=3001
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    depends_on:
      temporal:
        condition: service_started
    restart: on-failure
    command: ["npx", "tsx", "src/server.ts"]

  worker:
    build: .
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    depends_on:
      temporal:
        condition: service_started
    restart: on-failure
    command: ["npx", "tsx", "src/worker.ts"]

volumes:
  temporal-db:
