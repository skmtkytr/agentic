services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
      - SKIP_DYNAMIC_CONFIG_CHECK=true
    volumes:
      - temporal-archival:/tmp/temporal_archival
      - temporal-vis-archival:/tmp/temporal_vis_archival
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 2s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  server:
    build: .
    network_mode: host
    environment:
      - TEMPORAL_ADDRESS=localhost:7233
      - TEMPORAL_NAMESPACE=default
      - PORT=3001
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-}
      - LOCAL_LLM_PROVIDER_NAME=${LOCAL_LLM_PROVIDER_NAME:-local-llm}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-local-llm}
      - DEFAULT_AGENT_CONFIG=${DEFAULT_AGENT_CONFIG:-}
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~/.config/claude}:/root/.claude
      - ./web/dist:/app/web/dist
    depends_on:
      temporal:
        condition: service_started
    restart: on-failure
    command: ["npx", "tsx", "src/server.ts"]

  worker:
    build: .
    network_mode: host
    environment:
      - TEMPORAL_ADDRESS=localhost:7233
      - TEMPORAL_NAMESPACE=default
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-}
      - LOCAL_LLM_PROVIDER_NAME=${LOCAL_LLM_PROVIDER_NAME:-local-llm}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-local-llm}
      - LOCAL_LLM_FALLBACK_MODEL=${LOCAL_LLM_FALLBACK_MODEL:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - ARTIFACT_DIR=/data/artifacts
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~/.config/claude}:/root/.claude
      - agentic-artifacts:/data/artifacts
    depends_on:
      temporal:
        condition: service_started
    restart: on-failure
    command: ["npx", "tsx", "src/worker.ts"]

  web-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    profiles: ["dev"]
    network_mode: host
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  temporal-db:
  temporal-archival:
  temporal-vis-archival:
  agentic-artifacts:
