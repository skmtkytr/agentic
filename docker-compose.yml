services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  server:
    build: .
    ports:
      - "3001:3001"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - PORT=3001
    volumes:
      # Mount Claude Code auth from host — run `claude` locally first to authenticate
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    depends_on:
      - temporal
    command: ["npx", "tsx", "src/server.ts"]

  worker:
    build: .
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
    volumes:
      # Same Claude auth mount — worker spawns claude CLI subprocesses
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    depends_on:
      - temporal
    command: ["npx", "tsx", "src/worker.ts"]
